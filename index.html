<!DOCTYPE html>

<html lang="en">

    <head>
        <title>Liamz | Home</title>

        <style>

            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;

                /* background */
                background-image: url(images/SiteBackground.jpg);    
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }

            #header {
                display: flex;
                background-color: #716ad3;
                padding: 20px;
                text-align: center;
                justify-content: center;
                align-items: center;
                height: 50px;
                margin: auto;
                border-bottom-left-radius: 20px;
                border-bottom-right-radius: 20px;
                border: 10px solid #8077ff;
                border-bottom-color: #9b94fd;
                border-top-color: #9b94fd;
                color: white;
            }

            .glass-overlay {
                position: fixed;       
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;

                background: rgba(255, 255, 255, 0.05);  
                backdrop-filter: blur(10px);            
                -webkit-backdrop-filter: blur(10px);   
                z-index: 1;                           
            }
            .overglass {
                position: relative;  
                z-index: 2;
            }

            #notice {
                display: flex;
                background-color: #716ad3;
                text-align: center;
                justify-content: center;
                align-items: center;
                height: auto;
                border: 10px solid #8077ff;
                border-bottom-color: #9b94fd;
                border-top-color: #9b94fd;
                color: white;
                margin: 20px;
                padding: 5px;
                border-radius: 20px;
                gap: 20px;
            }

            #notice img {
                margin-right: 20px;
                border-radius: 10px;
            }



            .divide {
                background-color: #716ad3;
                height: auto;
                border: 10px solid #8077ff;
                border-bottom-color: #9b94fd;
                border-top-color: #9b94fd;
                border-radius: 20px;
                margin: 20px;
            }

            #content {
                display:flex;
                flex-wrap: wrap;
                gap: 16px;
                padding: 20px;
                justify-content: center;
                justify-items: center;
                box-sizing: border-box;
                overflow: hidden;
                border: 10px solid #8077ff;
                border-bottom-color: #9b94fd;
                border-top-color: #9b94fd;
                background-color: #716ad3;
                margin: 20px;
                border-radius: 20px;
            }
            #card {
                background-color: #c6a2ff;
                width: 200px;
                height: 200px;
                display: flex;
                flex-direction: column;
                padding: 5px;
                border-radius: 20px;
                border: 10px solid #8077ff;
                border-bottom-color: #9b94fd;
                border-top-color: #9b94fd;
                background-color: #716ad3;
            }

            #card img {
                width: 100%;
                height: 160px;
                object-fit: cover;
                flex-shrink: 0;
                border-radius: 10px;
            }


            #card h2 {
                padding: 5px;
                margin: 0;
                text-align: center;
                text-overflow: ellipsis;
                justify-content: center;
                color: white;
            }

            #card p {
                padding: 5px;
                margin: 0;
                text-align: center;
                text-overflow: ellipsis;
                justify-content: center;
                color: white;
            }

        </style>
    </head>

    <body>
        <div class="glass-overlay"></div>
        <div id="header" class="overglass">
            <h1>Liamz</h1>
        </div>    

        <hr class="divide">

    </body>

</html>
